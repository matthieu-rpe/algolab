<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>AlgoLab : Sorting Algorithms</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header>
      <h1>Sorting Algorithms</h1>
      <div class="controls">
        <div class="inputs">
          <div class="input">
            <label for="data">Columns</label>
            <input type="number" id="data" value="30" min="1" max="1000" />
          </div>
          <div class="input">
            <label for="speed">Speed (ms)</label>
            <input type="number" id="speed" value="100" min="1" max="10000" />
          </div>
        </div>
        <div class="launchers">
          <button id="reset">New data</button>
          <button id="play" class="hidden">Start</button>
        </div>
      </div>
    </header>

    <main>
      <div class="container">
        <div class="visualizer">
          <h3>Bubble Sort</h3>
          <canvas id="bubble-canvas"></canvas>
        </div>
      </div>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
